<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Prosty ranking</title>
  <link rel="stylesheet" href="style.css"> 
</head>

<body>

<div class="navbar">

  <div class="nav-left">
    🏆 Ranking Chwały
  </div>

  <div class="nav-center">
    <span id="navbarDate"></span>
  </div>

  <div class="nav-right">

    <div id="loginBox">
      <input id="email" placeholder="email">
      <input id="password" type="password" placeholder="hasło">
      <button id="loginBtn" onclick="login()">Zaloguj</button>
      <div id="loginError"></div>
    </div>

    <div id="userBox" style="display:none;">
      <span id="userName"></span>
      <button onclick="logout()">Wyloguj</button>
    </div>

  </div>

</div>
  
<div class="container">

  <a href="index.html" class="backButton">
    ⬅ Powrót do rankingu
  </a>

  <h1>Prosty ranking</h1>

  <div id="ranking">
    <div class="loading">Ładowanie...</div>
  </div>

</div>

<!-- KOLEJNOŚĆ MA ZNACZENIE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>
<script src="simple-ranking.js"></script>

</body>
</html>
